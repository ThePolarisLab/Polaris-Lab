name: Executive Memory CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "feature/v0.5.0-executive-memory"]

permissions:
  contents: read

jobs:
  test-executive-memory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run Executive Memory tests
        run: npm test -- --runTestsByPath tests/athena/ExecutiveMemory.test.ts
