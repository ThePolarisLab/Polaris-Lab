name: PGE-008 Runtime Verification

on:
  pull_request:
    paths:
      - "chief-of-staff/**"
      - ".github/workflows/pge-008-runtime.yml"
  push:
    branches:
      - main
    paths:
      - "chief-of-staff/**"
      - ".github/workflows/pge-008-runtime.yml"

jobs:
  backend:
    name: Backend runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chief-of-staff/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: chief-of-staff/backend/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Verify backend runtime contract
        env:
          PYTHONPATH: .
        run: python -m pytest -q tests/test_runtime.py

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chief-of-staff/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: chief-of-staff/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
